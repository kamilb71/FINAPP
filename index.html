<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Finanse</title>
<link rel="manifest" href="manifest.json">
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
</script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222;
    --border: #2e2e2e;
    --text: #f0f0f0;
    --muted: #666;
    --green: #00e676;
    --red: #ff4444;
    --accent: #ffe44d;
    --blue: #4db8ff;
    --radius: 12px;
    --font-mono: 'Space Mono', monospace;
    --font-sans: 'Syne', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    padding-bottom: 80px;
  }

  /* HEADER */
  .header {
    padding: 20px 20px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header h1 {
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 400;
  }
  .month-nav {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .month-nav button {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 18px;
    padding: 4px;
    line-height: 1;
  }
  .month-nav button:hover { color: var(--text); }
  #month-label {
    font-family: var(--font-mono);
    font-size: 13px;
    min-width: 90px;
    text-align: center;
  }

  /* BALANCE CARD */
  .balance-card {
    margin: 16px 20px;
    background: var(--surface);
    border-radius: var(--radius);
    padding: 24px;
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }
  .balance-card::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 120px; height: 120px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,228,77,0.08) 0%, transparent 70%);
  }
  .balance-label {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .balance-amount {
    font-family: var(--font-mono);
    font-size: 36px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 20px;
  }
  .balance-amount.positive { color: var(--green); }
  .balance-amount.negative { color: var(--red); }
  .balance-row {
    display: flex;
    gap: 24px;
  }
  .balance-item { flex: 1; }
  .balance-item .label {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .balance-item .val {
    font-family: var(--font-mono);
    font-size: 16px;
    font-weight: 700;
  }
  .val.income { color: var(--green); }
  .val.expense { color: var(--red); }

  /* TABS */
  .tabs {
    display: flex;
    margin: 0 20px 16px;
    background: var(--surface);
    border-radius: 8px;
    padding: 4px;
    border: 1px solid var(--border);
  }
  .tab {
    flex: 1;
    padding: 8px;
    text-align: center;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 6px;
    color: var(--muted);
    transition: all 0.2s;
    font-weight: 700;
  }
  .tab.active {
    background: var(--accent);
    color: #000;
  }

  /* SECTIONS */
  .section { display: none; }
  .section.active { display: block; }

  /* CATEGORY BREAKDOWN */
  .section-title {
    padding: 0 20px;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .cat-list { padding: 0 20px; display: flex; flex-direction: column; gap: 8px; }
  .cat-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .cat-bar-wrap {
    flex: 1;
  }
  .cat-name {
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 5px;
    display: flex;
    justify-content: space-between;
  }
  .cat-name span { font-family: var(--font-mono); font-size: 12px; color: var(--muted); font-weight: 400; }
  .cat-bar-bg {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .cat-bar {
    height: 100%;
    border-radius: 2px;
    background: var(--accent);
    transition: width 0.5s ease;
  }

  /* TRANSACTION LIST */
  .tx-list { padding: 0 20px; display: flex; flex-direction: column; gap: 6px; }
  .tx-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .tx-item:hover { border-color: var(--accent); }
  .tx-icon {
    width: 36px; height: 36px;
    border-radius: 8px;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .tx-info { flex: 1; min-width: 0; }
  .tx-sklep {
    font-size: 13px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .tx-meta {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .tx-tag {
    background: var(--surface2);
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 10px;
  }
  .tx-tag.projekt { color: var(--blue); border: 1px solid rgba(77,184,255,0.3); background: transparent; }
  .tx-tag.zrodlo { color: var(--accent); border: 1px solid rgba(255,228,77,0.3); background: transparent; }
  .tx-amount {
    font-family: var(--font-mono);
    font-size: 14px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .tx-amount.pos { color: var(--green); }
  .tx-amount.neg { color: var(--red); }
  .tx-copy-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 6px;
    width: 28px; height: 28px;
    cursor: pointer;
    font-size: 14px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    margin-left: 4px;
  }
  .tx-copy-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* EMPTY STATE */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty .icon { font-size: 40px; margin-bottom: 12px; }
  .empty p { font-size: 13px; line-height: 1.6; }

  /* ADD BUTTON */
  .fab {
    position: fixed;
    bottom: 24px;
    right: 50%;
    transform: translateX(50%);
    max-width: 480px;
    width: calc(100% - 40px);
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 14px;
    padding: 16px;
    font-family: var(--font-sans);
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: transform 0.15s, opacity 0.15s;
    box-shadow: 0 8px 32px rgba(255,228,77,0.2);
    z-index: 100;
  }
  .fab:hover { transform: translateX(50%) scale(1.02); }
  .fab:active { transform: translateX(50%) scale(0.98); }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(4px);
    z-index: 200;
    display: none;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    padding: 24px 20px 40px;
    width: 100%;
    max-width: 480px;
    max-height: 90vh;
    overflow-y: auto;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }
  .modal-title {
    font-size: 18px;
    font-weight: 800;
  }
  .modal-close {
    background: var(--surface2);
    border: none;
    color: var(--text);
    width: 32px; height: 32px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* FORM */
  .form-group { margin-bottom: 16px; }
  .form-label {
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
    display: block;
  }
  .form-input, .form-select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-family: var(--font-sans);
    font-size: 15px;
    outline: none;
    transition: border-color 0.15s;
    appearance: none;
  }
  .form-input:focus, .form-select:focus { border-color: var(--accent); }
  .form-row { display: flex; gap: 12px; }
  .form-row .form-group { flex: 1; }

  /* TYPE TOGGLE */
  .type-toggle {
    display: flex;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px;
    gap: 4px;
  }
  .type-btn {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 7px;
    cursor: pointer;
    font-family: var(--font-sans);
    font-size: 13px;
    font-weight: 700;
    transition: all 0.15s;
    background: none;
    color: var(--muted);
  }
  .type-btn.active-wydatek { background: var(--red); color: #fff; }
  .type-btn.active-wpływ { background: var(--green); color: #000; }

  /* FORM ACTIONS */
  .form-actions { display: flex; gap: 10px; margin-top: 20px; }
  .btn-primary {
    flex: 1;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-family: var(--font-sans);
    font-size: 14px;
    font-weight: 800;
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 20px;
    font-family: var(--font-sans);
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
  }
  .btn-danger {
    background: rgba(255,68,68,0.1);
    color: var(--red);
    border: 1px solid rgba(255,68,68,0.3);
    border-radius: 10px;
    padding: 14px 20px;
    font-family: var(--font-sans);
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
  }

  /* DRIVE STATUS */
  .drive-status {
    margin: 0 20px 16px;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
  }
  .drive-status.connected { border-color: rgba(0,230,118,0.3); }
  .drive-status.error { border-color: rgba(255,68,68,0.3); }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
  }
  .status-dot.green { background: var(--green); }
  .status-dot.red { background: var(--red); }
  .status-dot.yellow { background: var(--accent); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* PROJEKTY SUMMARY */
  .projekt-list { padding: 0 20px; display: flex; flex-direction: column; gap: 8px; }
  .projekt-item {
    background: var(--surface);
    border: 1px solid rgba(77,184,255,0.2);
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .projekt-name { font-size: 13px; font-weight: 700; color: var(--blue); }
  .projekt-count { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .projekt-amount { font-family: var(--font-mono); font-size: 15px; font-weight: 700; color: var(--red); }

  .spacer { height: 16px; }

  /* KONTO BADGE */
  /* CYKLICZNA TOGGLE */
  .cykliczna-row {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .toggle-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
  }
  .toggle-wrap input[type=checkbox] { display: none; }
  .toggle-slider {
    width: 40px; height: 22px;
    background: var(--border);
    border-radius: 11px;
    position: relative;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .toggle-slider::after {
    content: '';
    position: absolute;
    top: 3px; left: 3px;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--muted);
    transition: transform 0.2s, background 0.2s;
  }
  .toggle-wrap input:checked + .toggle-slider { background: var(--accent); }
  .toggle-wrap input:checked + .toggle-slider::after { transform: translateX(18px); background: #000; }
  .toggle-label { font-size: 13px; color: var(--text); }

  /* CYKLICZNA BANNER */
  .cykliczna-banner {
    margin: 0 20px 12px;
    background: rgba(255,228,77,0.07);
    border: 1px solid rgba(255,228,77,0.25);
    border-radius: 12px;
    padding: 14px 16px;
  }
  .cykliczna-banner h3 {
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
  }
  .cykliczna-proposal {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .cykliczna-proposal:last-child { border-bottom: none; padding-bottom: 0; }
  .prop-info { flex: 1; min-width: 0; }
  .prop-sklep { font-size: 13px; font-weight: 700; }
  .prop-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .prop-amount { font-family: var(--font-mono); font-size: 13px; font-weight: 700; flex-shrink: 0; }
  .prop-amount.neg { color: var(--red); }
  .prop-amount.pos { color: var(--green); }
  .prop-btns { display: flex; gap: 6px; flex-shrink: 0; }
  .btn-ok {
    background: var(--green); color: #000;
    border: none; border-radius: 6px;
    padding: 5px 10px; font-size: 12px; font-weight: 700;
    cursor: pointer; font-family: var(--font-sans);
  }
  .btn-skip {
    background: var(--surface2); color: var(--muted);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 5px 10px; font-size: 12px; font-weight: 700;
    cursor: pointer; font-family: var(--font-sans);
  }
  /* CYKLICZNA BADGE on tx */
  .tx-cyclic-badge {
    font-size: 10px;
    color: var(--accent);
    flex-shrink: 0;
    margin-left: 2px;
  }

.konto-badge {
    font-size: 10px;
    padding: 1px 5px;
    border-radius: 3px;
    background: var(--surface2);
    color: var(--muted);
  }
</style>
</head>
<body>

<div class="header">
  <h1>Finanse</h1>
  <div class="month-nav">
    <button onclick="changeMonth(-1)">‹</button>
    <span id="month-label"></span>
    <button onclick="changeMonth(1)">›</button>
  </div>
</div>

<div id="drive-status" class="drive-status">
  <div class="status-dot yellow" id="status-dot"></div>
  <span id="status-text">Łączenie z Google Drive...</span>
</div>

<div class="balance-card">
  <div class="balance-label">Saldo miesiąca</div>
  <div class="balance-amount" id="saldo">+0,00 PLN</div>
  <div class="balance-row">
    <div class="balance-item">
      <div class="label">Wpływy</div>
      <div class="val income" id="total-income">0,00 PLN</div>
    </div>
    <div class="balance-item">
      <div class="label">Wydatki</div>
      <div class="val expense" id="total-expense">0,00 PLN</div>
    </div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('lista')">Lista</div>
  <div class="tab" onclick="switchTab('kategorie')">Kategorie</div>
  <div class="tab" onclick="switchTab('projekty')">Projekty</div>
</div>

<!-- LISTA -->
<div class="section active" id="tab-lista">
  <div class="tx-list" id="tx-list"></div>
</div>

<!-- KATEGORIE -->
<div class="section" id="tab-kategorie">
  <p class="section-title">Wydatki wg kategorii</p>
  <div class="cat-list" id="cat-list"></div>
</div>

<!-- PROJEKTY -->
<div class="section" id="tab-projekty">
  <p class="section-title">Projekty</p>
  <div class="projekt-list" id="projekt-list"></div>
</div>

<button class="fab" onclick="openModal()">＋ Dodaj transakcję</button>

<!-- MODAL ADD/EDIT -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Nowa transakcja</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>

    <div class="form-group">
      <label class="form-label">Typ</label>
      <div class="type-toggle">
        <button class="type-btn active-wydatek" id="btn-wydatek" onclick="setTyp('wydatek')">Wydatek</button>
        <button class="type-btn" id="btn-wpływ" onclick="setTyp('wpływ')">Wpływ</button>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Kwota (PLN)</label>
        <input class="form-input" id="f-kwota" type="number" step="0.01" min="0" placeholder="0.00">
      </div>
      <div class="form-group">
        <label class="form-label">Data</label>
        <input class="form-input" id="f-data" type="date">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Sklep / Od-Do</label>
      <input class="form-input" id="f-sklep" type="text" placeholder="np. Lidl, KFC, Wynagrodzenie...">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Kategoria</label>
        <select class="form-select" id="f-kat">
          <option value="Auto">Auto</option>
          <option value="Chemia">Chemia</option>
          <option value="Dochody">Dochody</option>
          <option value="Dom">Dom</option>
          <option value="Firma">Firma</option>
          <option value="Inne">Inne</option>
          <option value="Rozrywka">Rozrywka</option>
          <option value="Specjalne">Specjalne</option>
          <option value="Sport">Sport</option>
          <option value="Transport">Transport</option>
          <option value="Wyżywienie">Wyżywienie</option>
          <option value="Zakupy">Zakupy</option>
          <option value="Zdrowie">Zdrowie</option>
          <option value="Zwierzęta">Zwierzęta</option>
          <option value="Życie">Życie</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Subkat.</label>
        <input class="form-input" id="f-subkat" type="text" placeholder="np. Praca, Dom...">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Konto</label>
      <select class="form-select" id="f-konto">
        <option>Santander Konto</option>
        <option>Santander Credit</option>
        <option>Gotówka</option>
        <option>Inne</option>
      </select>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Projekt</label>
        <input class="form-input" id="f-projekt" type="text" placeholder="np. Projekt piwo">
      </div>
      <div class="form-group">
        <label class="form-label">Źródło</label>
        <input class="form-input" id="f-zrodlo" type="text" placeholder="np. Premia Q1">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Uwagi</label>
      <input class="form-input" id="f-uwagi" type="text" placeholder="opcjonalnie...">
    </div>

    <div class="form-group">
      <label class="form-label">Cykliczna</label>
      <div class="cykliczna-row">
        <label class="toggle-wrap">
          <input type="checkbox" id="f-cykliczna" onchange="toggleCykliczna()">
          <span class="toggle-slider"></span>
          <span class="toggle-label">Cykliczna</span>
        </label>
        <div id="cykliczna-extra" style="display:none;align-items:center;gap:8px;flex-wrap:wrap">
          <span style="font-size:13px;color:var(--muted)">przez</span>
          <input class="form-input" id="f-co-ile" type="number" min="1" max="120" value="1" style="width:70px">
          <span style="font-size:13px;color:var(--muted)">miesięcy</span>
        </div>
      </div>
    </div>

    <div class="form-actions">
      <button class="btn-secondary" id="btn-delete" style="display:none" onclick="deleteTransaction()">Usuń</button>
      <button class="btn-primary" onclick="saveTransaction()">Zapisz</button>
    </div>
  </div>
</div>

<script>
// ─── STATE ───────────────────────────────────────────────
const MONTHS = ['Styczeń','Luty','Marzec','Kwiecień','Maj','Czerwiec','Lipiec','Sierpień','Wrzesień','Październik','Listopad','Grudzień'];
const CAT_ICONS = {
  'Wyżywienie':'🍽️','Transport':'🚆','Auto':'🚗','Sport':'💪','Zdrowie':'💊',
  'Rozrywka':'🎭','Zakupy':'🛍️','Chemia':'🧴','Zwierzęta':'🐾','Dom':'🏡','Życie':'🏠',
  'Firma':'💼','Specjalne':'⭐','Dochody':'💰','Inne':'📌'
};

let state = {
  transactions: [],
  currentYear: new Date().getFullYear(),
  currentMonth: new Date().getMonth(),
  editId: null,
  currentTyp: 'wydatek',
  driveFileId: null,
  saving: false,
};

// ─── GOOGLE SHEETS ────────────────────────────────────────
function getScriptUrl() {
  let url = localStorage.getItem('finanse_script_url');
  if (!url) {
    url = prompt('Podaj URL Apps Script (jednorazowo):');
    if (url && url.trim()) {
      localStorage.setItem('finanse_script_url', url.trim());
    }
  }
  return url ? url.trim() : null;
}
const SCRIPT_URL = getScriptUrl();

function setStatus(type, text) {
  const dot = document.getElementById('status-dot');
  const el = document.getElementById('status-text');
  const wrap = document.getElementById('drive-status');
  dot.className = 'status-dot ' + (type === 'ok' ? 'green' : type === 'err' ? 'red' : 'yellow');
  wrap.className = 'drive-status ' + (type === 'ok' ? 'connected' : type === 'err' ? 'error' : '');
  el.textContent = text;
}

async function loadFromSheets() {
  if (!SCRIPT_URL) {
    setStatus('err', 'Brak URL — odśwież i podaj URL Apps Script');
    loadFromCache(); render(); return;
  }
  setStatus('load', 'Wczytuję z Google Sheets...');
  try {
    const res = await fetch(SCRIPT_URL);
    const data = await res.json();
    state.transactions = data;
    // sync to localStorage as cache
    localStorage.setItem('finanse_tx', JSON.stringify(data));
    setStatus('ok', `Sheets · ${data.length} transakcji`);
  } catch(e) {
    console.warn('Sheets load failed, using cache:', e);
    setStatus('err', 'Brak połączenia — dane z cache');
    loadFromCache();
  }
  render();
}

function loadFromCache() {
  try {
    const raw = localStorage.getItem('finanse_tx');
    if (raw) state.transactions = JSON.parse(raw);
  } catch(e) {
    state.transactions = [];
  }
}

async function saveToSheets() {
  setStatus('load', 'Zapisuję...');
  // optimistic local cache
  localStorage.setItem('finanse_tx', JSON.stringify(state.transactions));
  try {
    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'save_all', transactions: state.transactions }),
    });
    const data = await res.json();
    if (data.ok) {
      setStatus('ok', `Sheets · ${state.transactions.length} transakcji`);
    } else {
      throw new Error(data.error);
    }
  } catch(e) {
    console.warn('Sheets save failed:', e);
    setStatus('err', 'Błąd zapisu — zapisano lokalnie');
  }
}

// alias used by rest of code
function loadFromLocal() { loadFromSheets(); }
function saveToLocal() { saveToSheets(); }

// ─── FILTERING ────────────────────────────────────────────
function monthTx() {
  return state.transactions.filter(t => {
    const d = new Date(t.data);
    return d.getFullYear() === state.currentYear && d.getMonth() === state.currentMonth;
  });
}

// ─── RENDER ───────────────────────────────────────────────
function render() {
  const txs = monthTx();
  const income = txs.filter(t => t.typ === 'wpływ').reduce((s,t) => s + t.kwota, 0);
  const expense = txs.filter(t => t.typ === 'wydatek').reduce((s,t) => s + t.kwota, 0);
  const saldo = income - expense;

  document.getElementById('month-label').textContent =
    MONTHS[state.currentMonth].slice(0,3) + ' ' + state.currentYear;
  document.getElementById('total-income').textContent = fmt(income);
  document.getElementById('total-expense').textContent = fmt(expense);
  const saldoEl = document.getElementById('saldo');
  saldoEl.textContent = (saldo >= 0 ? '+' : '') + fmt(saldo);
  saldoEl.className = 'balance-amount ' + (saldo >= 0 ? 'positive' : 'negative');

  renderCykliczneBanner();
  renderLista(txs);
  renderKategorie(txs);
  renderProjekty(txs);
}

function getCykliczneProposals() {
  // coIle = number of months the transaction repeats (every month for coIle months)
  const templates = state.transactions.filter(t => t.cykliczna);
  const proposals = [];
  const y = state.currentYear;
  const m = state.currentMonth;

  templates.forEach(t => {
    const orig = new Date(t.data);
    const origY = orig.getFullYear();
    const origM = orig.getMonth();
    // How many months after origin are we?
    const monthsDiff = (y - origY) * 12 + (m - origM);
    // Must be in future relative to origin, and within the coIle window
    if (monthsDiff <= 0) return;
    if (monthsDiff > t.coIle) return;

    // Already booked this month?
    const alreadyExists = state.transactions.some(x =>
      x.cyklicznaSourceId === t.id &&
      new Date(x.data).getFullYear() === y &&
      new Date(x.data).getMonth() === m
    );
    const dismissedKey = `dismissed_${t.id}_${y}_${m}`;
    const dismissed = localStorage.getItem(dismissedKey);
    if (!alreadyExists && !dismissed) proposals.push(t);
  });
  return proposals;
}

function renderCykliczneBanner() {
  const existing = document.getElementById('cykliczna-banner');
  if (existing) existing.remove();
  const proposals = getCykliczneProposals();
  if (!proposals.length) return;

  const banner = document.createElement('div');
  banner.className = 'cykliczna-banner';
  banner.id = 'cykliczna-banner';
  banner.innerHTML = `
    <h3>↺ Cykliczne do zatwierdzenia (${proposals.length})</h3>
    ${proposals.map(t => `
      <div class="cykliczna-proposal">
        <div class="prop-info">
          <div class="prop-sklep">${t.sklep || t.kat}</div>
          <div class="prop-meta">${t.kat}${t.subkat ? ' · ' + t.subkat : ''} · przez ${t.coIle} mies.</div>
        </div>
        <div class="prop-amount ${t.typ === 'wpływ' ? 'pos' : 'neg'}">
          ${t.typ === 'wpływ' ? '+' : '-'}${fmt(t.kwota)}
        </div>
        <div class="prop-btns">
          <button class="btn-ok" onclick="approveCykliczna('${t.id}')">✓</button>
          <button class="btn-skip" onclick="skipCykliczna('${t.id}')">✕</button>
        </div>
      </div>
    `).join('')}
  `;

  const tabs = document.querySelector('.tabs');
  tabs.parentNode.insertBefore(banner, tabs.nextSibling);
}

function approveCykliczna(sourceId) {
  const t = state.transactions.find(x => x.id === sourceId);
  if (!t) return;
  const d = new Date(state.currentYear, state.currentMonth, new Date(t.data).getDate());
  const tx = {
    ...t,
    id: uid(),
    data: d.toISOString().slice(0,10),
    cyklicznaSourceId: sourceId,
    cykliczna: false,
  };
  state.transactions.push(tx);
  saveToLocal();
  render();
}

function skipCykliczna(sourceId) {
  const key = `dismissed_${sourceId}_${state.currentYear}_${state.currentMonth}`;
  localStorage.setItem(key, '1');
  render();
}

function renderLista(txs) {
  const el = document.getElementById('tx-list');
  if (!txs.length) {
    el.innerHTML = `<div class="empty"><div class="icon">📭</div><p>Brak transakcji w tym miesiącu.<br>Dodaj pierwszą!</p></div>`;
    return;
  }
  const sorted = [...txs].sort((a,b) => new Date(b.data) - new Date(a.data));
  el.innerHTML = sorted.map(t => `
    <div class="tx-item" onclick="openEdit('${t.id}')">
      <div class="tx-icon">${CAT_ICONS[t.kat] || '📌'}</div>
      <div class="tx-info">
        <div class="tx-sklep">${t.sklep || t.kat}</div>
        <div class="tx-meta">
          <span>${fmtDate(t.data)}</span>
          <span class="tx-tag">${t.subkat || t.kat}</span>
          ${t.projekt ? `<span class="tx-tag projekt">⚡ ${t.projekt}</span>` : ''}
          ${t.zrodlo ? `<span class="tx-tag zrodlo">↗ ${t.zrodlo}</span>` : ''}
          ${t.cykliczna ? `<span class="tx-cyclic-badge">↺ ${t.coIle}mies.</span>` : ''}
        </div>
      </div>
      <div class="tx-amount ${t.typ === 'wpływ' ? 'pos' : 'neg'}">
        ${t.typ === 'wpływ' ? '+' : '-'}${fmt(t.kwota)}
      </div>
      <button class="tx-copy-btn" onclick="event.stopPropagation();openCopy('${t.id}')" title="Kopiuj">⧉</button>
    </div>
  `).join('');
}

function renderKategorie(txs) {
  const el = document.getElementById('cat-list');
  const wydatki = txs.filter(t => t.typ === 'wydatek');
  if (!wydatki.length) { el.innerHTML = `<div class="empty"><div class="icon">📊</div><p>Brak wydatków.</p></div>`; return; }
  const byKat = {};
  wydatki.forEach(t => { byKat[t.kat] = (byKat[t.kat] || 0) + t.kwota; });
  const sorted = Object.entries(byKat).sort((a,b) => b[1]-a[1]);
  const max = sorted[0][1];
  el.innerHTML = sorted.map(([kat, sum]) => `
    <div class="cat-item">
      <div style="font-size:20px">${CAT_ICONS[kat]||'📌'}</div>
      <div class="cat-bar-wrap">
        <div class="cat-name">${kat} <span>${fmt(sum)}</span></div>
        <div class="cat-bar-bg"><div class="cat-bar" style="width:${(sum/max*100).toFixed(1)}%"></div></div>
      </div>
    </div>
  `).join('');
}

function renderProjekty(txs) {
  const el = document.getElementById('projekt-list');
  const withProjekt = txs.filter(t => t.projekt);
  if (!withProjekt.length) {
    el.innerHTML = `<div class="empty"><div class="icon">⚡</div><p>Brak transakcji z projektem.</p></div>`;
    return;
  }
  const byP = {};
  withProjekt.forEach(t => {
    if (!byP[t.projekt]) byP[t.projekt] = { sum: 0, count: 0, zrodla: new Set() };
    byP[t.projekt].sum += t.typ === 'wydatek' ? t.kwota : -t.kwota;
    byP[t.projekt].count++;
    if (t.zrodlo) byP[t.projekt].zrodla.add(t.zrodlo);
  });
  el.innerHTML = Object.entries(byP).map(([p, d]) => `
    <div class="projekt-item">
      <div>
        <div class="projekt-name">⚡ ${p}</div>
        <div class="projekt-count">${d.count} transakcji${d.zrodla.size ? ' · ' + [...d.zrodla].join(', ') : ''}</div>
      </div>
      <div class="projekt-amount">${d.sum >= 0 ? '-' : '+'}${fmt(Math.abs(d.sum))}</div>
    </div>
  `).join('');
}

// ─── HELPERS ──────────────────────────────────────────────
function fmt(n) {
  return Math.abs(n).toLocaleString('pl-PL', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' PLN';
}
function fmtDate(s) {
  if (!s) return '';
  const d = new Date(s);
  return d.getDate() + ' ' + MONTHS[d.getMonth()].slice(0,3);
}
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2);
}

// ─── NAVIGATION ───────────────────────────────────────────
function changeMonth(dir) {
  state.currentMonth += dir;
  if (state.currentMonth > 11) { state.currentMonth = 0; state.currentYear++; }
  if (state.currentMonth < 0) { state.currentMonth = 11; state.currentYear--; }
  render();
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    const names = ['lista','kategorie','projekty'];
    t.classList.toggle('active', names[i] === name);
  });
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
}

// ─── MODAL ────────────────────────────────────────────────
function openModal() {
  state.editId = null;
  document.getElementById('modal-title').textContent = 'Nowa transakcja';
  document.getElementById('btn-delete').style.display = 'none';
  resetForm();
  document.getElementById('modal-overlay').classList.add('open');
}

function openEdit(id) {
  const t = state.transactions.find(x => x.id === id);
  if (!t) return;
  state.editId = id;
  document.getElementById('modal-title').textContent = 'Edytuj transakcję';
  document.getElementById('btn-delete').style.display = 'block';
  setTyp(t.typ);
  document.getElementById('f-kwota').value = t.kwota;
  document.getElementById('f-data').value = t.data;
  document.getElementById('f-sklep').value = t.sklep || '';
  document.getElementById('f-kat').value = t.kat;
  document.getElementById('f-subkat').value = t.subkat || '';
  document.getElementById('f-konto').value = t.konto || 'Santander Konto';
  document.getElementById('f-projekt').value = t.projekt || '';
  document.getElementById('f-zrodlo').value = t.zrodlo || '';
  document.getElementById('f-uwagi').value = t.uwagi || '';
  document.getElementById('f-cykliczna').checked = !!t.cykliczna;
  document.getElementById('f-co-ile').value = t.coIle || '1';
  document.getElementById('cykliczna-extra').style.display = t.cykliczna ? 'flex' : 'none';
  document.getElementById('modal-overlay').classList.add('open');
}

function openCopy(id) {
  const t = state.transactions.find(x => x.id === id);
  if (!t) return;
  state.editId = null;
  document.getElementById('modal-title').textContent = 'Kopiuj transakcję';
  document.getElementById('btn-delete').style.display = 'none';
  setTyp(t.typ);
  document.getElementById('f-kwota').value = t.kwota;
  document.getElementById('f-data').value = new Date().toISOString().slice(0,10);
  document.getElementById('f-sklep').value = t.sklep || '';
  document.getElementById('f-kat').value = t.kat;
  document.getElementById('f-subkat').value = t.subkat || '';
  document.getElementById('f-konto').value = t.konto || 'Santander Konto';
  document.getElementById('f-projekt').value = t.projekt || '';
  document.getElementById('f-zrodlo').value = t.zrodlo || '';
  document.getElementById('f-uwagi').value = t.uwagi || '';
  document.getElementById('f-cykliczna').checked = !!t.cykliczna;
  document.getElementById('f-co-ile').value = t.coIle || '1';
  document.getElementById('cykliczna-extra').style.display = t.cykliczna ? 'flex' : 'none';
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function resetForm() {
  setTyp('wydatek');
  document.getElementById('f-kwota').value = '';
  document.getElementById('f-data').value = new Date().toISOString().slice(0,10);
  document.getElementById('f-sklep').value = '';
  document.getElementById('f-kat').value = 'Wyżywienie';
  document.getElementById('f-subkat').value = '';
  document.getElementById('f-konto').value = 'Santander Konto';
  document.getElementById('f-projekt').value = '';
  document.getElementById('f-zrodlo').value = '';
  document.getElementById('f-uwagi').value = '';
  document.getElementById('f-cykliczna').checked = false;
  document.getElementById('f-co-ile').value = '1';
  document.getElementById('cykliczna-extra').style.display = 'none';
}

function setTyp(typ) {
  state.currentTyp = typ;
  const bW = document.getElementById('btn-wydatek');
  const bP = document.getElementById('btn-wpływ');
  bW.className = 'type-btn' + (typ === 'wydatek' ? ' active-wydatek' : '');
  bP.className = 'type-btn' + (typ === 'wpływ' ? ' active-wpływ' : '');
  // Auto-set kategoria
  if (typ === 'wpływ' && document.getElementById('f-kat').value === 'Wyżywienie') {
    document.getElementById('f-kat').value = 'Dochody';
  }
  if (typ === 'wydatek' && document.getElementById('f-kat').value === 'Dochody') {
    document.getElementById('f-kat').value = 'Wyżywienie';
  }
}

function toggleCykliczna() {
  const checked = document.getElementById('f-cykliczna').checked;
  document.getElementById('cykliczna-extra').style.display = checked ? 'flex' : 'none';
}

function saveTransaction() {
  const kwota = parseFloat(document.getElementById('f-kwota').value);
  const data = document.getElementById('f-data').value;
  if (!kwota || kwota <= 0) { alert('Podaj kwotę!'); return; }
  if (!data) { alert('Podaj datę!'); return; }

  const tx = {
    id: state.editId || uid(),
    typ: state.currentTyp,
    kwota,
    data,
    sklep: document.getElementById('f-sklep').value.trim(),
    kat: document.getElementById('f-kat').value,
    subkat: document.getElementById('f-subkat').value.trim(),
    konto: document.getElementById('f-konto').value,
    projekt: document.getElementById('f-projekt').value.trim(),
    zrodlo: document.getElementById('f-zrodlo').value.trim(),
    uwagi: document.getElementById('f-uwagi').value.trim(),
    cykliczna: document.getElementById('f-cykliczna').checked,
    coIle: parseInt(document.getElementById('f-co-ile').value) || 1,
  };

  if (state.editId) {
    const idx = state.transactions.findIndex(x => x.id === state.editId);
    state.transactions[idx] = tx;
  } else {
    state.transactions.push(tx);
  }

  saveToLocal();
  closeModal();
  render();
}

function deleteTransaction() {
  if (!confirm('Usunąć tę transakcję?')) return;
  state.transactions = state.transactions.filter(x => x.id !== state.editId);
  saveToLocal();
  closeModal();
  render();
}

// ─── CLOSE ON OVERLAY CLICK ───────────────────────────────
document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ─── INIT ─────────────────────────────────────────────────
document.getElementById('f-data').value = new Date().toISOString().slice(0,10);
loadFromLocal();
</script>
<div style="text-align:center;padding:16px 0 4px;font-size:10px;letter-spacing:2px;color:#333;font-family:'Space Mono',monospace">FINAPP v0.01</div>
</body>
</html>
